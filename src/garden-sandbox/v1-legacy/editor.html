<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>场景编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:"Microsoft YaHei",sans-serif;overflow:hidden;height:100vh}
canvas{display:block;background:#16213e}
#bar{position:fixed;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;background:rgba(0,0,0,0.85);padding:10px 6px;border-radius:10px;z-index:10}
.bt{width:40px;height:40px;border-radius:6px;border:2px solid rgba(255,255,255,0.1);cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s;position:relative}
.bt:hover{border-color:#fff;transform:scale(1.08)}
.bt.on{border-color:#4ecdc4;box-shadow:0 0 10px rgba(78,205,196,0.5)}
.tt{position:absolute;right:50px;background:rgba(0,0,0,0.9);color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s}
.bt:hover .tt{opacity:1}
#top{position:fixed;top:10px;left:10px;z-index:10;display:flex;gap:6px}
#top button{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.6);color:#ccc;cursor:pointer;font-size:12px;transition:.15s}
#top button:hover{background:rgba(78,205,196,0.15);color:#4ecdc4}
#info{position:fixed;bottom:10px;left:10px;z-index:10;font-size:11px;color:#555}
input[type=file]{display:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="bar">
<button class="bt on" data-b="1" style="background:#777"><span class="tt">道路 1x1</span>路</button>
<button class="bt" data-b="2" style="background:#c44"><span class="tt">墙壁、1x1</span>墙</button>
<button class="bt" data-b="3" style="background:#48c"><span class="tt">水域 1x1</span><💧</button>
<button class="bt" data-b="4" style="background:#e2b04a"><span class="tt">亭子 5x5</span>🏯</button>
<button class="bt" data-b="5" style="background:#c8a"><span class="tt">月涌门 3x3</span>🏨</button>
<button class="bt" data-b="0" style="background:rgba(255,255,255,0.05);color:#888"><span class="tt">擩陴</span>✗</button>
</div>
<div id="top">
<button id="sv">保存 tilemap.json</button>
<button id="ld">加载</button>
<button id="cl" style="color:#e74c3c;border-color:#e74c3c">清空</button>
<a href="launcher.html"><button>返回</button></a>
</div>
<div id="info">按住左键综制 | 置齨缩放 |中键拘抿 |当前: 道路</div>
<input type="file" id="fl" accept=".json">
<script>
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const info=document.getElementById("info");
const SZ=30;
let brush=1,down=false,tiles={},zoom=1,px=0,py=0;
const CLR={1:"#777",2:"#c44",3:"#48c",4:"#e2b04a",5:"#c8a"};
const NM={0:"擩陴",1:"道路",2:"墙壁",3:"水域",4:"亭子",5:"月涌门"};

function rz(){cv.width=innerWidth;cv.height=innerHeight;}
window.addEventListener("resize",rz);rz();

function s2w(sx,sy){var s=zoom*Math.min(cv.width,cv.height)/(SZ*2.2);return{x:Math.round((sx-cv.width/2)/s+px),y:Math.round((sy-cv.height/2)/s+py)};}

function draw(){
  var w=cv.width,h=cv.height,s=zoom*Math.min(w,h)/(SZ*2.2);
  var ox=w/2-px*s,oy=h/2-py*s;
  ctx.fillStyle="#16213e";ctx.fillRect(0,0,w,h);
  for(var k in tiles){var p=k.split(","),x=+p[0],y=+p[1],c=CLR[tiles[k]];if(c){ctx.fillStyle=c;ctx.globalAlpha=0.7;ctx.fillRect(ox+x*s-s/2,oy+y*s-s/2,s,s);ctx.globalAlpha=1;}}
  ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=0.5;
  var g0=-SZ-2,g1=SZ+2;
  for(var x=g0;x<=g1;x++){ctx.beginPath();ctx.moveTo(ox+x*s,oy+g0*s);ctx.lineTo(ox+x*s,oy+g1*s);ctx.stroke();}
  for(var y=g0;y<=g1;y++){ctx.beginPath();ctx.moveTo(ox+g0*s,oy+y*s);ctx.lineTo(ox+g1*s,oy+y*s);ctx.stroke();}
  ctx.strokeStyle="rgba(78,205,196,0.3)";ctx.lineWidth=2;
  ctx.strokeRect(ox-SZ*s,oy-SZ*s,SZ*2*s,SZ*2*s);
}

function paint(e){
  if(!down)return;
  var p=s2w(e.clientX,e.clientY);
  var r=0;
  if(brush===4)r=2;
  if(brush===5)r=1;
  for(var dx=-r;dx<=r;dx++){
    for(var dy=-r;dy<=r;dy++){
      var k=(p.x+dx)+","+(p.y+dy);
      if(brush===0)delete tiles[k];
      else tiles[k]=brush;
    }
  }
  info.textContent="("+p.x+","+p.y+") "+NM[brush]+(r>0?" ["+(r*2+1)+"x"+(r*2+1)+"]":"");
}

cv.addEventListener("mousedown",function(e){down=true;paint(e);});
cv.addEventListener("mousemove",paint);
cv.addEventListener("mouseup",function(){down=false;});
cv.addEventListener("mouseleave",function(){down=false;});
cv.addEventListener("wheel",function(e){e.preventDefault();zoom=Math.max(0.2,Math.min(5,zoom*(e.deltaY>0?0.9:1.1)));draw();});
cv.addEventListener("contextmenu",function(e){e.preventDefault();});

var mdx=0,mdy=0,moving=false;
cv.addEventListener("mousedown",function(e){if(e.button===1){moving=true;mdx=e.clientX;mdy=e.clientY;}});
cv.addEventListener("mousemove",function(e){if(moving){var s=zoom*Math.min(cv.width,cv.height)/(SZ*2.2);px-=(e.clientX-mdx)/s;py-=(e.clientY-mdy)/s;mdx=e.clientX;mdy=e.clientY;draw();}});
cv.addEventListener("mouseup",function(){moving=false;});

var bts=document.querySelectorAll(".bt");
for(var i=0;i<bts.length;i++){(function(b){b.addEventListener("click",function(){for(var j=0;j<bts.length;j++)bts[j].classList.remove("on");b.classList.add("on");brush=parseInt(b.dataset.b);info.textContent="按住左键综制 | 置齨缩放 |中键拘抿 |当前: "+NM[brush];});})(bts[i]);}

document.getElementById("sv").addEventListener("click",function(){var b=new Blob([JSON.stringify(tiles)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="tilemap.json";a.click();info.textContent="已保存! 放入 scene_data/ 文件夹";});
document.getElementById("ld").addEventListener("click",function(){document.getElementById("fl").click();});
document.getElementById("fl").addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{tiles=JSON.parse(ev.target.result);info.textContent="已加载 "+Object.keys(tiles).length+" 个投惼元";draw();}catch(ex){info.textContent="文件格式错误";}};r.readAsText(f);});
document.getElementById("cl").addEventListener("click",function(){if(confirm("清空中未完成的路点?")){tiles={};info.textContent="已清空";draw();}});
(function loop(){draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
